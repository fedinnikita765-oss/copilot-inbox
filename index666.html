<!DOCTYPE html>
<html lang="ru">
<head>

<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}:root{--bg:#faf9f7;--card:#fff;--card2:#f5f3ef;--bdr:#e8e4dd;--tx:#1a1815;--tx2:#6b6560;--ac:#d4622b;--ac2:#b8501e;--acbg:rgba(212,98,43,.08);--gn:#2d8a4e;--gnbg:rgba(45,138,78,.08);--rd:#c13030;--rdbg:rgba(193,48,48,.08);--yl:#b07d10;--ylbg:rgba(176,125,16,.08);--bl:#2563a8;--blbg:rgba(37,99,168,.08);--sh:0 1px 3px rgba(0,0,0,.06);--r:12px;--f:'DM Sans',system-ui,sans-serif;--fh:'Playfair Display',Georgia,serif}body{font-family:var(--f);background:var(--bg);color:var(--tx);min-height:100vh;font-size:14px;line-height:1.5;-webkit-tap-highlight-color:transparent}.nav{position:fixed;bottom:0;left:0;right:0;z-index:100;background:#fff;border-top:1px solid var(--bdr);display:flex;padding:6px 0 env(safe-area-inset-bottom,6px)}.nb{flex:1;display:flex;flex-direction:column;align-items:center;gap:1px;padding:8px 0;background:0;border:0;color:var(--tx2);font-size:10px;font-weight:500;cursor:pointer;font-family:var(--f)}.nb.on{color:var(--ac);font-weight:700}.nb i{font-size:18px;font-style:normal}.pg{display:none;padding-bottom:72px}.pg.on{display:block}.hdr{background:#fff;border-bottom:1px solid var(--bdr);padding:20px;position:sticky;top:0;z-index:50}.hdr-r{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}.hdr h1{font-family:var(--fh);font-size:22px;letter-spacing:-.02em}.hdr h1 span{color:var(--ac)}.btn{padding:8px 16px;background:var(--ac);color:#fff;border:0;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;font-family:var(--f)}.btn:active{transform:scale(.96)}.sts{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}.sb{background:var(--card2);border-radius:10px;padding:10px 12px;text-align:center}.sb .n{font-size:22px;font-weight:700}.sb .l{font-size:9px;color:var(--tx2);text-transform:uppercase;letter-spacing:.08em;font-weight:500;margin-top:2px}.fb{display:flex;gap:6px;padding:12px 16px;overflow-x:auto;scrollbar-width:none;background:#fff;border-bottom:1px solid var(--bdr)}.fb::-webkit-scrollbar{display:none}.ft{flex-shrink:0;padding:6px 14px;border-radius:20px;font-size:12px;font-weight:500;color:var(--tx2);background:var(--card2);border:1px solid transparent;cursor:pointer;font-family:var(--f)}.ft.on{background:var(--acbg);color:var(--ac);border-color:var(--ac);font-weight:700}.ls{padding:8px 12px}.cd{background:#fff;border:1px solid var(--bdr);border-radius:var(--r);padding:14px 16px;margin-bottom:8px;cursor:pointer;box-shadow:var(--sh);position:relative}.cd:active{transform:scale(.99)}.cd::after{content:'';position:absolute;left:0;top:12px;bottom:12px;width:3px;border-radius:0 3px 3px 0}.cd.u-high::after{background:var(--rd)}.cd.u-medium::after{background:var(--yl)}.cd.u-low::after{background:var(--gn)}.ct{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}.cu{display:flex;align-items:center;gap:10px;flex:1;min-width:0}.av{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;color:#fff;flex-shrink:0}.un{font-weight:700;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.uh{font-size:10px;color:var(--tx2)}.tm{font-size:10px;color:var(--tx2)}.cm{font-size:12px;color:var(--tx2);margin-bottom:8px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}.cf{display:flex;gap:4px;flex-wrap:wrap}.tg{font-size:9px;font-weight:700;padding:3px 8px;border-radius:6px;text-transform:uppercase}.tg.NEW_LEAD{background:var(--gnbg);color:var(--gn)}.tg.QUESTION{background:var(--blbg);color:var(--bl)}.tg.COMPLAINT{background:var(--rdbg);color:var(--rd)}.tg.FOLLOWUP{background:var(--ylbg);color:var(--yl)}.tg.PAYMENT{background:rgba(156,100,30,.08);color:#9c641e}.tg.OTHER,.tg.SPAM{background:var(--card2);color:var(--tx2)}.dr{background:var(--acbg);border-radius:8px;padding:8px 10px;margin-top:8px;font-size:11px;color:var(--ac2);line-height:1.4}.cx{background:var(--blbg);border-radius:8px;padding:6px 10px;margin-top:6px;font-size:11px;color:var(--bl)}.ov{position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:200;opacity:0;pointer-events:none;transition:.25s}.ov.on{opacity:1;pointer-events:all}.pn{position:fixed;bottom:0;left:0;right:0;max-height:88vh;background:#fff;border-radius:16px 16px 0 0;z-index:201;transform:translateY(100%);transition:transform .3s cubic-bezier(.32,.72,0,1);overflow-y:auto;padding-bottom:32px;box-shadow:0 -8px 40px rgba(0,0,0,.12)}.pn.on{transform:translateY(0)}.ph{width:32px;height:4px;background:var(--bdr);border-radius:4px;margin:10px auto 16px}.dh{padding:0 20px 16px;display:flex;align-items:center;gap:14px;border-bottom:1px solid var(--bdr)}.da{width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;color:#fff}.dn h3{font-size:18px;font-weight:700;font-family:var(--fh)}.dn p{font-size:12px;color:var(--tx2)}.ds{padding:14px 20px;border-bottom:1px solid var(--bdr)}.ds h4{font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--tx2);margin-bottom:10px;font-weight:700}.mg{display:grid;grid-template-columns:1fr 1fr;gap:8px}.mi{background:var(--card2);border-radius:8px;padding:8px 10px}.mi label{font-size:9px;text-transform:uppercase;letter-spacing:.05em;color:var(--tx2);display:block;margin-bottom:2px}.mi span{font-size:13px;font-weight:700}.bb{padding:8px 12px;border-radius:10px 10px 10px 3px;background:var(--card2);margin-bottom:6px;max-width:85%;font-size:12px}.bb.out{background:var(--acbg);border-radius:10px 10px 3px 10px;margin-left:auto;color:var(--ac2)}.bb .t{font-size:9px;color:var(--tx2);margin-top:2px}.da2{display:flex;gap:8px;padding:16px 20px}.db{flex:1;padding:10px;border-radius:8px;font-size:12px;font-weight:700;border:0;cursor:pointer;font-family:var(--f);text-align:center}.db:active{transform:scale(.96)}.db.sec{background:var(--card2);color:var(--tx2)}.db.red{background:var(--rdbg);color:var(--rd)}.tc{background:#fff;border:1px solid var(--bdr);border-radius:var(--r);padding:14px 16px;margin-bottom:8px;display:flex;gap:12px;box-shadow:var(--sh)}.tk{width:22px;height:22px;border-radius:6px;border:2px solid var(--bdr);flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;margin-top:1px}.tk:active{transform:scale(.85)}.tk.d{background:var(--gn);border-color:var(--gn);color:#fff;font-size:12px}.tb{flex:1}.tt{font-size:13px;font-weight:700;margin-bottom:2px}.tt.d{text-decoration:line-through;color:var(--tx2)}.tm2{font-size:10px;color:var(--tx2)}.sg{padding:16px 20px;border-bottom:1px solid var(--bdr)}.sg h4{font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--tx2);margin-bottom:4px;font-weight:700}.sg p{font-size:11px;color:var(--tx2);margin-bottom:8px}.si{width:100%;padding:10px 12px;border-radius:8px;border:1px solid var(--bdr);background:var(--card2);color:var(--tx);font-size:13px;font-family:var(--f);resize:vertical}.si:focus{outline:none;border-color:var(--ac)}textarea.si{min-height:70px}.ss{margin-top:6px;padding:7px 16px;background:var(--ac);color:#fff;border:0;border-radius:6px;font-size:11px;font-weight:700;cursor:pointer}.ss:active{transform:scale(.96)}.tr{display:flex;align-items:center;justify-content:space-between;padding:10px 0}.tr span{font-size:13px;font-weight:600}.to{width:44px;height:24px;border-radius:12px;background:var(--bdr);position:relative;cursor:pointer;transition:.25s}.to.on{background:var(--gn)}.to::after{content:'';position:absolute;top:2px;left:2px;width:20px;height:20px;border-radius:10px;background:#fff;transition:.25s;box-shadow:0 1px 3px rgba(0,0,0,.15)}.to.on::after{left:22px}.mb{position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:300;display:none;align-items:flex-end;justify-content:center}.mb.on{display:flex}.md{background:#fff;border-radius:16px 16px 0 0;width:100%;max-width:480px;padding:24px 20px 36px;box-shadow:0 -4px 24px rgba(0,0,0,.1)}.md h3{font-family:var(--fh);font-size:18px;margin-bottom:14px}.md input,.md textarea,.md select{width:100%;padding:10px 12px;margin-bottom:10px;border-radius:8px;border:1px solid var(--bdr);background:var(--card2);color:var(--tx);font-size:13px;font-family:var(--f)}.md textarea{min-height:50px;resize:vertical}.mbs{display:flex;gap:8px;margin-top:4px}.mbs button{flex:1;padding:10px;border-radius:8px;font-size:13px;font-weight:700;border:0;cursor:pointer;font-family:var(--f)}.mc{background:var(--card2);color:var(--tx2)}.ms{background:var(--ac);color:#fff}.em{text-align:center;padding:48px 20px;color:var(--tx2)}.em .ei{font-size:36px;margin-bottom:10px}.em h3{font-size:16px;color:var(--tx);margin-bottom:4px;font-family:var(--fh)}.em p{font-size:12px;line-height:1.5}
</style>
</head>
<body>
<div class="pg on" id="p-in"><div class="hdr"><div class="hdr-r"><h1>Inbox<span>.</span></h1><button class="btn" onclick="oAC()">+ Контакт</button></div><div class="sts"><div class="sb"><div class="n" id="sa">0</div><div class="l">Всего</div></div><div class="sb"><div class="n" id="si">0</div><div class="l">Входящие</div></div><div class="sb"><div class="n" id="sm">0</div><div class="l">Ручные</div></div><div class="sb"><div class="n" id="so">0</div><div class="l">Открыто</div></div></div></div><div class="fb" id="fb"><button class="ft on" data-t="">Все</button><button class="ft" data-t="NEW_LEAD">Лиды</button><button class="ft" data-t="QUESTION">Вопросы</button><button class="ft" data-t="COMPLAINT">Жалобы</button><button class="ft" data-t="FOLLOWUP">Follow-up</button><button class="ft" data-t="PAYMENT">Оплата</button></div><div class="ls" id="cl"></div></div>
<div class="pg" id="p-tk"><div class="hdr"><div class="hdr-r"><h1>Задачи<span>.</span></h1><button class="btn" onclick="oAT()">+ Задача</button></div><div class="sts" style="grid-template-columns:repeat(3,1fr)"><div class="sb"><div class="n" id="to2">0</div><div class="l">Открыто</div></div><div class="sb"><div class="n" id="td2">0</div><div class="l">Готово</div></div><div class="sb"><div class="n" id="tt2">0</div><div class="l">Всего</div></div></div></div><div class="fb"><button class="ft on" onclick="fT('a',this)">Все</button><button class="ft" onclick="fT('o',this)">Открытые</button><button class="ft" onclick="fT('d',this)">Готовые</button><button class="ft" onclick="fT('h',this)">Важные</button></div><div class="ls" id="tl"></div></div>
<div class="pg" id="p-st"><div class="hdr"><div class="hdr-r"><h1>Настройки<span>.</span></h1></div></div><div class="sg"><h4>Приветствие</h4><p>Первое сообщение новым клиентам</p><textarea class="si" id="xg"></textarea><button class="ss" onclick="xS('greeting','xg')">Сохранить</button></div><div class="sg"><h4>Стиль AI</h4><p>Как нейросеть отвечает</p><textarea class="si" id="xs"></textarea><button class="ss" onclick="xS('ai_style','xs')">Сохранить</button></div><div class="sg"><h4>О бизнесе</h4><p>Контекст для AI</p><textarea class="si" id="xc"></textarea><button class="ss" onclick="xS('business_context','xc')">Сохранить</button></div><div class="sg"><h4>Дисклеймер</h4><p>Пометка в конце автоответа</p><textarea class="si" id="xd"></textarea><button class="ss" onclick="xS('ai_disclaimer','xd')">Сохранить</button></div><div class="sg"><div class="tr"><span>Авто-ответ AI</span><div class="to" id="xar" onclick="xAR()"></div></div></div></div>
<div class="nav"><button class="nb on" onclick="go('in',this)"><i>📥</i>Inbox</button><button class="nb" onclick="go('tk',this)"><i>📌</i>Задачи</button><button class="nb" onclick="go('st',this)"><i>⚙️</i>Настройки</button></div>
<div class="ov" id="ov" onclick="cD()"></div><div class="pn" id="pn"><div class="ph"></div><div id="dc"></div></div>
<div class="mb" id="mac"><div class="md"><h3>Новый контакт</h3><input id="an" placeholder="Имя"><input id="au" placeholder="@username"><div class="mbs"><button class="mc" onclick="cAC()">Отмена</button><button class="ms" onclick="aC()">Добавить</button></div></div></div>
<div class="mb" id="mat"><div class="md"><h3>Новая задача</h3><input id="atn" placeholder="Название"><textarea id="atd" placeholder="Описание"></textarea><select id="atp"><option value="low">Низкий</option><option value="medium" selected>Средний</option><option value="high">Высокий</option></select><div class="mbs"><button class="mc" onclick="cAT()">Отмена</button><button class="ms" onclick="aT()">Создать</button></div></div></div>
<script>
const tg=window.Telegram?.WebApp;if(tg){tg.ready();tg.expand()}
const TG={NEW_LEAD:'Лид',QUESTION:'Вопрос',COMPLAINT:'Жалоба',FOLLOWUP:'Follow-up',PAYMENT:'Оплата',SPAM:'Спам',OTHER:'Другое'};
const CO=['#d4622b','#2d8a4e','#2563a8','#c13030','#b07d10','#7c5cbf','#c1584e','#3a7d6e'];
let C=[],T=[],ST={},cF='',tFi='a';
function loadHash(){const h=location.hash.substring(1);if(!h)return false;try{let b=h.replace(/-/g,'+').replace(/_/g,'/');while(b.length%4)b+='=';const j=decodeURIComponent(escape(atob(b)));const d=JSON.parse(j);if(d.c)C=d.c.map(x=>({id:x.i,un:x.u||'',nm:x.n||'',tag:x.t||'OTHER',st:x.s||'open',ur:x.ur||'medium',sn:x.sn||'neutral',lm:x.lm||'',tm:x.tm||'',dr:x.dr||'',sr:x.sr||'auto',cx:x.cx||'',mn:x.mn||0,mc:x.mc||0,ms:(x.ms||[]).map(m=>({d:m.d,t:m.t,w:m.w}))}));if(d.t)T=d.t.map(x=>({id:x.id,ti:x.ti||'',ds:x.ds||'',pr:x.pr||'medium',dn:x.dn||0,cn:x.cn||'',ci:x.ci||0}));if(d.s)ST=d.s;return true}catch(e){console.error(e);return false}}
function ini(n){return(n||'?').split(' ').map(w=>w[0]).join('').substring(0,2).toUpperCase()}
function cl(id){return CO[Math.abs(typeof id==='number'?id:0)%CO.length]}
function ago(i){if(!i)return'';const d=Math.floor((Date.now()-new Date(i).getTime())/60000);if(d<1)return'сейчас';if(d<60)return d+' мин';if(d<1440)return Math.floor(d/60)+'ч';return Math.floor(d/1440)+'д'}
function nt(t){if(tg)tg.showAlert(t);else alert(t)}
function go(p,b){document.querySelectorAll('.pg').forEach(x=>x.classList.remove('on'));document.getElementById('p-'+p).classList.add('on');document.querySelectorAll('.nb').forEach(x=>x.classList.remove('on'));b.classList.add('on')}
function R(){rC();rT();uS();lS()}
function uS(){document.getElementById('sa').textContent=C.length;document.getElementById('si').textContent=C.filter(c=>c.sr==='auto').length;document.getElementById('sm').textContent=C.filter(c=>c.mn).length;document.getElementById('so').textContent=C.filter(c=>c.st!=='closed').length;document.getElementById('to2').textContent=T.filter(t=>!t.dn).length;document.getElementById('td2').textContent=T.filter(t=>t.dn).length;document.getElementById('tt2').textContent=T.length}
function rC(){const f=cF?C.filter(c=>c.tag===cF):C;const e=document.getElementById('cl');if(!f.length){e.innerHTML='<div class="em"><div class="ei">'+(C.length?'🔍':'📭')+'</div><h3>'+(C.length?'Нет по фильтру':'Нет контактов')+'</h3><p>'+(C.length?'Другой тег':'Напишите боту /add или дождитесь клиентов. /inbox для обновления.')+'</p></div>';return}e.innerHTML=f.map(c=>'<div class="cd u-'+c.ur+'" onclick="oD('+c.id+')"><div class="ct"><div class="cu"><div class="av" style="background:'+cl(c.id)+'">'+ini(c.nm)+'</div><div><div class="un">'+( c.nm||'—')+'</div><div class="uh">'+(c.un?'@'+c.un:c.mn?'✋ ручной':'')+(c.mc?' · '+c.mc+' сообщ.':'')+'</div></div></div><div class="tm">'+ago(c.tm)+'</div></div><div class="cm">'+c.lm+'</div><div class="cf"><span class="tg '+c.tag+'">'+( TG[c.tag]||c.tag)+'</span>'+(c.st==='closed'?'<span class="tg OTHER">закрыт</span>':'')+'</div>'+(c.cx?'<div class="cx">💡 '+c.cx+'</div>':'')+(c.dr?'<div class="dr">🤖 '+c.dr+'</div>':'')+'</div>').join('')}
function oD(id){const c=C.find(x=>x.id==id);if(!c)return;const sm={positive:'Позитивный',neutral:'Нейтральный',negative:'Негативный'};const um={high:'Высокий',medium:'Средний',low:'Низкий'};document.getElementById('dc').innerHTML='<div class="dh"><div class="da" style="background:'+cl(c.id)+'">'+ini(c.nm)+'</div><div class="dn"><h3>'+(c.nm||'—')+'</h3><p>'+(c.un?'@'+c.un:'—')+(c.mn?' · вручную':'')+'</p></div></div><div class="ds"><h4>Карточка</h4><div class="mg"><div class="mi"><label>Тег</label><span>'+(TG[c.tag]||c.tag)+'</span></div><div class="mi"><label>Приоритет</label><span>'+(um[c.ur]||'—')+'</span></div><div class="mi"><label>Тональность</label><span>'+(sm[c.sn]||'—')+'</span></div><div class="mi"><label>Сообщений</label><span>'+(c.mc||0)+'</span></div></div></div>'+(c.cx?'<div class="ds"><h4>Что хочет клиент</h4><p style="font-size:13px">'+c.cx+'</p></div>':'')+(c.ms&&c.ms.length?'<div class="ds"><h4>Последние сообщения</h4>'+c.ms.slice().reverse().map(m=>'<div class="bb '+(m.d==='out'?'out':'')+'">'+m.t+'<div class="t">'+(m.w?new Date(m.w).toLocaleString('ru',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'}):'')+'</div></div>').join('')+'</div>':'')+(c.dr?'<div class="ds"><h4>Ответ AI</h4><div class="dr" style="margin:0">🤖 '+c.dr+'</div></div>':'')+'<div class="da2"><button class="db sec" onclick="tCC('+c.id+')">'+(c.st==='closed'?'Открыть':'Закрыть')+'</button><button class="db red" onclick="dCC('+c.id+')">Удалить</button></div>';document.getElementById('ov').classList.add('on');document.getElementById('pn').classList.add('on')}
function cD(){document.getElementById('ov').classList.remove('on');document.getElementById('pn').classList.remove('on')}
function tCC(id){const c=C.find(x=>x.id==id);if(c)c.st=c.st==='closed'?'open':'closed';R();cD();if(tg&&tg.sendData)try{tg.sendData(JSON.stringify({action:'close_contact',chat_id:id}))}catch(e){}}
function dCC(id){C=C.filter(x=>x.id!=id);R();cD()}
function rT(){let f=T;if(tFi==='o')f=T.filter(t=>!t.dn);else if(tFi==='d')f=T.filter(t=>t.dn);else if(tFi==='h')f=T.filter(t=>t.pr==='high'&&!t.dn);const e=document.getElementById('tl');if(!f.length){e.innerHTML='<div class="em"><div class="ei">📌</div><h3>Нет задач</h3><p>Создаются из запросов клиентов или вручную</p></div>';return}e.innerHTML=f.map(t=>'<div class="tc"><div class="tk '+(t.dn?'d':'')+'" onclick="tTT('+t.id+')">'+(t.dn?'✓':'')+'</div><div class="tb"><div class="tt '+(t.dn?'d':'')+'">'+ t.ti+'</div><div class="tm2">'+({high:'🔴',medium:'🟡',low:'🟢'}[t.pr]||'🟡')+' '+(t.cn||'')+'</div>'+(t.ds?'<div style="font-size:11px;color:var(--tx2);margin-top:3px">'+t.ds+'</div>':'')+'</div></div>').join('')}
function tTT(id){const t=T.find(x=>x.id==id);if(t)t.dn=t.dn?0:1;R()}
function fT(f,b){tFi=f;document.querySelectorAll('#p-tk .ft').forEach(x=>x.classList.remove('on'));b.classList.add('on');rT()}
function lS(){document.getElementById('xg').value=ST.greeting||'';document.getElementById('xs').value=ST.ai_style||'';document.getElementById('xc').value=ST.business_context||'';document.getElementById('xd').value=ST.ai_disclaimer||'';document.getElementById('xar').classList.toggle('on',ST.auto_reply!==false)}
function xS(k,el){ST[k]=document.getElementById(el).value;nt('Сохранено! В боте: /'+{greeting:'setgreeting',ai_style:'setstyle',business_context:'setcontext',ai_disclaimer:'setdisclaimer'}[k]);if(tg&&tg.sendData)try{tg.sendData(JSON.stringify({action:'save_setting',key:k,value:ST[k]}))}catch(e){}}
function xAR(){ST.auto_reply=!ST.auto_reply;document.getElementById('xar').classList.toggle('on')}
