<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Business Copilot — Inbox</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Nunito:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  :root{--bg:#0e0f14;--surface:#16171e;--s2:#1e2029;--border:#2a2c38;--text:#e8eaf0;--muted:#7a7e92;
  --accent:#6c5ce7;--glow:rgba(108,92,231,.25);--green:#00d68f;--green-bg:rgba(0,214,143,.12);
  --red:#ff6b6b;--red-bg:rgba(255,107,107,.12);--yellow:#feca57;--yellow-bg:rgba(254,202,87,.12);
  --blue:#54a0ff;--blue-bg:rgba(84,160,255,.12);--orange:#ff9f43;--r:14px;--font:'Nunito',sans-serif;--mono:'JetBrains Mono',monospace}
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;-webkit-tap-highlight-color:transparent}
  body::before{content:'';position:fixed;top:-40%;left:-20%;width:80vw;height:80vw;background:radial-gradient(circle,rgba(108,92,231,.08) 0%,transparent 70%);pointer-events:none}

  .header{position:sticky;top:0;z-index:100;background:rgba(14,15,20,.85);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:16px 20px 12px}
  .header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
  .logo{display:flex;align-items:center;gap:10px}
  .logo-icon{width:36px;height:36px;background:linear-gradient(135deg,var(--accent),#a29bfe);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;box-shadow:0 4px 16px var(--glow)}
  .logo-text{font-weight:800;font-size:17px}.logo-badge{font-size:10px;font-weight:600;background:var(--accent);color:#fff;padding:2px 7px;border-radius:20px;margin-left:4px}

  .stats-strip{display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px}
  .stats-strip::-webkit-scrollbar{display:none}
  .stat-chip{flex-shrink:0;display:flex;align-items:center;gap:6px;padding:6px 12px;background:var(--surface);border:1px solid var(--border);border-radius:20px;font-size:12px;font-weight:600;white-space:nowrap;cursor:pointer;transition:all .2s}
  .stat-chip:active{transform:scale(.95)}.stat-chip .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
  .stat-chip.active{border-color:var(--accent);background:rgba(108,92,231,.1)}

  .filter-bar{display:flex;gap:4px;padding:12px 20px;overflow-x:auto;scrollbar-width:none}
  .filter-bar::-webkit-scrollbar{display:none}
  .filter-tab{flex-shrink:0;padding:7px 14px;border-radius:20px;font-size:13px;font-weight:600;color:var(--muted);background:0;border:0;cursor:pointer;transition:all .2s;white-space:nowrap}
  .filter-tab.active{background:var(--accent);color:#fff;box-shadow:0 2px 12px var(--glow)}

  .conv-list{padding:0 12px 100px}
  .conv-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px;margin-bottom:8px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden;animation:slideUp .4s ease both}
  .conv-card:active{transform:scale(.985)}
  @keyframes slideUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
  .conv-card::before{content:'';position:absolute;left:0;top:0;width:3px;height:100%;border-radius:0 3px 3px 0}
  .conv-card.u-high::before{background:var(--red)}.conv-card.u-medium::before{background:var(--yellow)}.conv-card.u-low::before{background:var(--green)}

  .conv-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:8px}
  .conv-user{display:flex;align-items:center;gap:10px;flex:1;min-width:0}
  .avatar{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:15px;flex-shrink:0;color:#fff}
  .user-info{flex:1;min-width:0}.user-name{font-weight:700;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .user-handle{font-size:12px;color:var(--muted);font-family:var(--mono)}
  .conv-time{font-size:11px;color:var(--muted);font-family:var(--mono);flex-shrink:0;margin-left:8px}
  .conv-message{font-size:13px;color:var(--muted);line-height:1.4;margin-bottom:10px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .conv-footer{display:flex;align-items:center;justify-content:space-between;gap:8px}
  .conv-tags{display:flex;gap:6px;flex-wrap:wrap;flex:1}
  .tag{font-size:10px;font-weight:700;padding:3px 8px;border-radius:6px;letter-spacing:.3px;text-transform:uppercase;white-space:nowrap}
  .tag.NEW_LEAD{background:var(--green-bg);color:var(--green)}.tag.QUESTION{background:var(--blue-bg);color:var(--blue)}
  .tag.COMPLAINT{background:var(--red-bg);color:var(--red)}.tag.FOLLOWUP{background:var(--yellow-bg);color:var(--yellow)}
  .tag.PAYMENT{background:rgba(255,159,67,.12);color:var(--orange)}.tag.OTHER{background:rgba(122,126,146,.12);color:var(--muted)}
  .tag.SPAM{background:rgba(122,126,146,.12);color:var(--muted)}

  .ai-draft{background:rgba(108,92,231,.08);border:1px solid rgba(108,92,231,.2);border-radius:10px;padding:10px 12px;margin-top:8px;display:flex;align-items:flex-start;gap:8px}
  .ai-draft-icon{font-size:14px;flex-shrink:0}.ai-draft-text{font-size:12px;color:#b8b0f0;line-height:1.4;flex:1}
  .ai-send{padding:5px 12px;background:var(--accent);color:#fff;border:0;border-radius:8px;font-size:11px;font-weight:700;cursor:pointer;flex-shrink:0}
  .ai-send:active{transform:scale(.92)}

  .action-btn{width:30px;height:30px;border-radius:8px;background:var(--s2);border:1px solid var(--border);color:var(--muted);font-size:13px;display:flex;align-items:center;justify-content:center;cursor:pointer}
  .action-btn:active{transform:scale(.9)}

  .detail-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;opacity:0;pointer-events:none;transition:opacity .3s}
  .detail-overlay.open{opacity:1;pointer-events:all}
  .detail-panel{position:fixed;bottom:0;left:0;right:0;max-height:85vh;background:var(--surface);border-top:1px solid var(--border);border-radius:20px 20px 0 0;z-index:201;transform:translateY(100%);transition:transform .35s cubic-bezier(.32,.72,0,1);overflow-y:auto;padding-bottom:30px}
  .detail-panel.open{transform:translateY(0)}
  .detail-handle{width:36px;height:4px;background:var(--border);border-radius:4px;margin:12px auto 16px}
  .detail-header{padding:0 20px 16px;display:flex;align-items:center;gap:14px;border-bottom:1px solid var(--border)}
  .detail-avatar{width:52px;height:52px;border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:800;color:#fff}
  .detail-user-info h3{font-size:18px;font-weight:800}.detail-user-info p{font-size:13px;color:var(--muted);font-family:var(--mono)}
  .detail-section{padding:16px 20px;border-bottom:1px solid var(--border)}
  .detail-section h4{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:12px;font-weight:700}
  .detail-meta{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .meta-item{background:var(--s2);border-radius:10px;padding:10px 12px}
  .meta-item label{font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);display:block;margin-bottom:4px}
  .meta-item span{font-size:14px;font-weight:700}
  .msg-bubble{padding:10px 14px;border-radius:14px 14px 14px 4px;background:var(--s2);margin-bottom:8px;max-width:85%;font-size:13px;line-height:1.5}
  .msg-bubble.out{background:rgba(108,92,231,.15);border-radius:14px 14px 4px 14px;margin-left:auto}
  .msg-bubble .time{font-size:10px;color:var(--muted);margin-top:4px;font-family:var(--mono)}
  .detail-actions{display:flex;gap:8px;padding:20px}
  .detail-btn{flex:1;padding:12px;border-radius:12px;border:1px solid var(--border);background:var(--s2);color:var(--text);font-size:13px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px}
  .detail-btn:active{transform:scale(.96)}.detail-btn.primary{background:var(--accent);border-color:var(--accent);color:#fff;box-shadow:0 4px 16px var(--glow)}

  .empty{text-align:center;padding:60px 30px;color:var(--muted)}.empty .icon{font-size:48px;margin-bottom:16px}.empty h3{font-size:18px;color:var(--text);margin-bottom:8px}
  .loading{text-align:center;padding:60px;color:var(--muted);font-size:14px}

  .conv-card:nth-child(1){animation-delay:.05s}.conv-card:nth-child(2){animation-delay:.1s}.conv-card:nth-child(3){animation-delay:.15s}
  .conv-card:nth-child(4){animation-delay:.2s}.conv-card:nth-child(5){animation-delay:.25s}

  /* ── CONFIG BANNER ── */
  .config-banner{background:rgba(255,107,107,.1);border:1px solid rgba(255,107,107,.3);border-radius:12px;padding:16px;margin:12px;text-align:center}
  .config-banner h3{color:var(--red);margin-bottom:8px;font-size:15px}
  .config-banner p{font-size:12px;color:var(--muted);line-height:1.5}
  .config-banner input{width:100%;padding:10px;margin-top:10px;border-radius:8px;border:1px solid var(--border);background:var(--s2);color:var(--text);font-family:var(--mono);font-size:12px}
  .config-banner button{margin-top:10px;padding:8px 20px;background:var(--accent);color:#fff;border:0;border-radius:8px;font-weight:700;cursor:pointer}
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div class="logo">
      <div class="logo-icon">⚡</div>
      <div><span class="logo-text">Copilot</span><span class="logo-badge">LIVE</span></div>
    </div>
  </div>
  <div class="stats-strip" id="statsStrip">
    <div class="stat-chip active" onclick="filterBy('all',this)"><span class="dot" style="background:var(--accent)"></span>Все <span id="statAll" style="color:var(--muted)">—</span></div>
    <div class="stat-chip" onclick="filterBy('open',this)"><span class="dot" style="background:var(--red)"></span>Открытые <span id="statOpen" style="color:var(--muted)">—</span></div>
    <div class="stat-chip" onclick="filterBy('closed',this)"><span class="dot" style="background:var(--green)"></span>Закрытые <span id="statClosed" style="color:var(--muted)">—</span></div>
  </div>
</div>

<div class="filter-bar" id="filterBar">
  <button class="filter-tab active" data-tag="">Все</button>
  <button class="filter-tab" data-tag="NEW_LEAD">🟢 Лиды</button>
  <button class="filter-tab" data-tag="QUESTION">❓ Вопросы</button>
  <button class="filter-tab" data-tag="COMPLAINT">🔴 Жалобы</button>
  <button class="filter-tab" data-tag="FOLLOWUP">🔄 Follow-up</button>
  <button class="filter-tab" data-tag="PAYMENT">💰 Оплата</button>
</div>

<div class="conv-list" id="convList"><div class="loading">Загрузка...</div></div>

<div class="detail-overlay" id="detailOverlay" onclick="closeDetail()"></div>
<div class="detail-panel" id="detailPanel">
  <div class="detail-handle"></div>
  <div id="detailContent"></div>
</div>

<script>
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  CONFIGURATION
//  Change API_BASE to your server's address
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
let API_BASE = localStorage.getItem('copilot_api') || '';

const TAG_LABELS = {
  NEW_LEAD: '🟢 Новый лид', QUESTION: '❓ Вопрос', COMPLAINT: '🔴 Жалоба',
  FOLLOWUP: '🔄 Follow-up', PAYMENT: '💰 Оплата', SPAM: '🚫 Спам', OTHER: '⚪ Другое'
};
const COLORS = ['#6c5ce7','#fd79a8','#00b894','#ff6b6b','#feca57','#54a0ff','#a29bfe','#ff9f43','#e84393','#2ed573'];
let conversations = [];
let currentFilter = {status: null, tag: null};

// Telegram WebApp
const tg = window.Telegram?.WebApp;
if (tg) { tg.ready(); tg.expand(); }

// ── Init ──
async function init() {
  if (!API_BASE) { showConfig(); return; }
  try {
    await loadStats();
    await loadConversations();
  } catch(e) {
    console.error(e);
    showConfig('Не удалось подключиться к API. Проверьте адрес.');
  }
}

function showConfig(err) {
  document.getElementById('convList').innerHTML = `
    <div class="config-banner">
      <h3>⚙️ Настройка подключения</h3>
      <p>${err || 'Укажите адрес API-сервера бота (например http://ваш-ip:8080)'}</p>
      <input id="apiInput" placeholder="http://localhost:8080" value="${API_BASE}">
      <button onclick="saveConfig()">Подключить</button>
    </div>`;
}

function saveConfig() {
  const val = document.getElementById('apiInput').value.replace(/\/+$/, '');
  if (!val) return;
  localStorage.setItem('copilot_api', val);
  API_BASE = val;
  init();
}

// ── API calls ──
async function apiGet(path) {
  const r = await fetch(API_BASE + path);
  if (!r.ok) throw new Error(r.statusText);
  return r.json();
}
async function apiPost(path, body) {
  const r = await fetch(API_BASE + path, {
    method: 'POST', headers: {'Content-Type':'application/json'}, body: body ? JSON.stringify(body) : undefined
  });
  return r.json();
}

// ── Load data ──
async function loadStats() {
  const s = await apiGet('/api/stats');
  document.getElementById('statAll').textContent = s.open + s.closed;
  document.getElementById('statOpen').textContent = s.open;
  document.getElementById('statClosed').textContent = s.closed;
}

async function loadConversations() {
  let url = '/api/conversations';
  const params = [];
  if (currentFilter.status && currentFilter.status !== 'all') params.push('status=' + currentFilter.status);
  if (currentFilter.tag) params.push('tag=' + currentFilter.tag);
  if (params.length) url += '?' + params.join('&');

  conversations = await apiGet(url);
  renderConversations();
}

// ── Render ──
function getInitials(name) {
  if (!name) return '?';
  return name.split(' ').map(w => w[0]).join('').substring(0,2).toUpperCase();
}

function getColor(id) { return COLORS[Math.abs(id) % COLORS.length]; }

function timeAgo(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  const now = new Date();
  const diff = Math.floor((now - d) / 60000);
  if (diff < 1) return 'сейчас';
  if (diff < 60) return diff + ' мин';
  if (diff < 1440) return Math.floor(diff/60) + 'ч';
  return Math.floor(diff/1440) + 'д';
}

function renderConversations() {
  const list = document.getElementById('convList');
  if (!conversations.length) {
    list.innerHTML = `<div class="empty"><div class="icon">📭</div><h3>Нет диалогов</h3><p>Когда кто-то напишет боту, диалоги появятся здесь</p></div>`;
    return;
  }

  list.innerHTML = conversations.map((c, i) => `
    <div class="conv-card u-${c.urgency || 'medium'}" onclick="openDetail(${c.chat_id})" style="animation-delay:${i*0.05}s">
      <div class="conv-top">
        <div class="conv-user">
          <div class="avatar" style="background:${getColor(c.chat_id)}">${getInitials(c.display_name)}</div>
          <div class="user-info">
            <div class="user-name">${c.display_name || 'Без имени'}</div>
            <div class="user-handle">${c.username ? '@'+c.username : ''}</div>
          </div>
        </div>
        <div class="conv-time">${timeAgo(c.last_message_at)}</div>
      </div>
      <div class="conv-message">${c.last_message || ''}</div>
      <div class="conv-footer">
        <div class="conv-tags">
          <span class="tag ${c.tag}">${TAG_LABELS[c.tag] || c.tag}</span>
          ${c.status === 'closed' ? '<span class="tag OTHER">закрыт</span>' : ''}
        </div>
        <div style="display:flex;gap:4px">
          <button class="action-btn" onclick="event.stopPropagation();sendDraft(${c.chat_id})" title="Отправить черновик">🤖</button>
          <button class="action-btn" onclick="event.stopPropagation();quickClose(${c.chat_id})" title="Закрыть">🔕</button>
        </div>
      </div>
      ${c.ai_draft ? `<div class="ai-draft">
        <div class="ai-draft-icon">🤖</div>
        <div class="ai-draft-text">${c.ai_draft}</div>
        <button class="ai-send" onclick="event.stopPropagation();sendDraft(${c.chat_id})">Отправить</button>
      </div>` : ''}
    </div>
  `).join('');
}

// ── Detail panel ──
async function openDetail(chatId) {
  try {
    const c = await apiGet(`/api/conversations/${chatId}`);
    const sentMap = {positive:'😊 Позитив',neutral:'😐 Нейтрально',negative:'😠 Негатив'};
    const urgMap = {high:'🔴 Высокий',medium:'🟡 Средний',low:'🟢 Низкий'};

    document.getElementById('detailContent').innerHTML = `
      <div class="detail-header">
        <div class="detail-avatar" style="background:${getColor(c.chat_id)}">${getInitials(c.display_name)}</div>
        <div class="detail-user-info"><h3>${c.display_name||'—'}</h3><p>${c.username?'@'+c.username:''}</p></div>
      </div>
      <div class="detail-section">
        <h4>Информация</h4>
        <div class="detail-meta">
          <div class="meta-item"><label>Тег</label><span>${TAG_LABELS[c.tag]||c.tag}</span></div>
          <div class="meta-item"><label>Приоритет</label><span>${urgMap[c.urgency]||'—'}</span></div>
          <div class="meta-item"><label>Тональность</label><span>${sentMap[c.sentiment]||'—'}</span></div>
          <div class="meta-item"><label>Статус</label><span>${c.status==='open'?'🟢 Открыт':'🔴 Закрыт'}</span></div>
        </div>
      </div>
      <div class="detail-section">
        <h4>Сообщения (${(c.messages||[]).length})</h4>
        ${(c.messages||[]).reverse().map(m => `
          <div class="msg-bubble ${m.direction==='out'?'out':''}">
            ${m.text}
            <div class="time">${m.timestamp ? new Date(m.timestamp).toLocaleTimeString('ru',{hour:'2-digit',minute:'2-digit'}) : ''}</div>
          </div>
        `).join('') || '<p style="color:var(--muted);font-size:13px">Нет сообщений</p>'}
      </div>
      ${c.ai_draft ? `<div class="detail-section"><h4>AI-черновик</h4>
        <div class="ai-draft" style="margin:0"><div class="ai-draft-icon">🤖</div><div class="ai-draft-text">${c.ai_draft}</div></div>
      </div>` : ''}
      ${(c.tasks||[]).length ? `<div class="detail-section"><h4>Задачи</h4>
        ${c.tasks.map(t=>`<p style="font-size:13px;margin-bottom:6px">${t.done?'✅':'⬜'} ${t.title}</p>`).join('')}
      </div>` : ''}
      <div class="detail-actions">
        <button class="detail-btn" onclick="createTaskFor(${c.chat_id})">📌 Задача</button>
        <button class="detail-btn" onclick="closeConv(${c.chat_id})">🔕 Закрыть</button>
        <button class="detail-btn primary" onclick="sendDraft(${c.chat_id})">✅ Отправить</button>
      </div>`;

    document.getElementById('detailOverlay').classList.add('open');
    document.getElementById('detailPanel').classList.add('open');
  } catch(e) { alert('Ошибка загрузки: ' + e.message); }
}

function closeDetail() {
  document.getElementById('detailOverlay').classList.remove('open');
  document.getElementById('detailPanel').classList.remove('open');
}

// ── Actions via API ──
async function sendDraft(chatId) {
  try {
    const r = await apiPost(`/api/conversations/${chatId}/send-draft`);
    if (r.ok) { notify('✅ Черновик отправлен'); await loadConversations(); }
    else notify('❌ ' + (r.error||'Ошибка'));
  } catch(e) { notify('❌ ' + e.message); }
}

async function quickClose(chatId) {
  try {
    await apiPost(`/api/conversations/${chatId}/close`);
    notify('🔕 Диалог закрыт');
    await loadConversations(); await loadStats();
  } catch(e) { notify('❌ ' + e.message); }
}

async function closeConv(chatId) {
  await quickClose(chatId);
  closeDetail();
}

async function createTaskFor(chatId) {
  try {
    await apiPost('/api/tasks', {chat_id: chatId, title: 'Follow-up по диалогу'});
    notify('📌 Задача создана');
  } catch(e) { notify('❌ ' + e.message); }
}

function notify(text) {
  if (tg) tg.showAlert(text);
  else alert(text);
}

// ── Filters ──
function filterBy(status, el) {
  document.querySelectorAll('.stat-chip').forEach(c => c.classList.remove('active'));
  if (el) el.classList.add('active');
  currentFilter.status = (status === 'all') ? null : status;
  loadConversations();
}

document.querySelectorAll('.filter-tab').forEach(tab => {
  tab.addEventListener('click', function() {
    document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
    this.classList.add('active');
    currentFilter.tag = this.dataset.tag || null;
    loadConversations();
  });
});

// Auto-refresh every 10 seconds
setInterval(() => { if (API_BASE) { loadConversations(); loadStats(); } }, 10000);

// ── Start ──
init();
</script>
</body>
</html>
